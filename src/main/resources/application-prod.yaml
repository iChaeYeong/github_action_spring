server:
  port: 8080

spring:
  application:
    name: app-monolithic
  datasource:
#    url: jdbc:mysql://localhost:3306/testdb
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    #    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create # 운영 권장: 스키마 자동 변경 금지 ( validate )
    properties:
      hibernate:
        format_sql: true # SQL 포맷팅

  data:
    redis:
#      host: localhost
      host: redis
      port: 6379

  # devtools 활성화
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true

logging:
  level:
    root: info
    org.springframework.web: debug
    org.hibernate.SQL: debug # 실행되는 SQL
    org.hibernate.orm.jdbc.bind: debug # 바인딩 파라미터
    org.hibernate.orm.jdbc.extract: debug # 결과 매핑/추출
    org.springframework.security: DEBUG

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

